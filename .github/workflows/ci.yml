name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: Next.js app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        # ESLint is fine to fail soft for now — TypeScript is the source of truth.
        run: npm run lint -- --max-warnings 0 || echo "Lint reported issues (non-blocking)."

      - name: Build (typecheck + bundle)
        env:
          # next build needs SOMETHING set for the public env vars or it warns
          # at static-route generation. Real values come from App Hosting.
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.example.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: ci-placeholder
          NEXT_PUBLIC_ADMIN_EMAIL: ci@example.com
          NEXT_PUBLIC_FUNCTIONS_BASE_URL: http://localhost:5001/ci/us-central1
        run: npm run build

  functions:
    name: Cloud Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck + compile
        run: npm run build

  seed-dry:
    name: Seed script dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Dry-run seed
        run: npm run seed:dry
